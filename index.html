<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FROP Clock</title>
  <style>
    * { box-sizing: border-box; margin: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #05070a;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .hero-logo {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      animation: breathe 3.6s ease-in-out infinite;
      transform-origin: center;
    }

    .clock {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 2;

    color: #ffffff;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }
      50% {
        transform: scale(1.01);
        filter: brightness(1.08);
      }
    }
  </style>
</head>
<body>
<img class="hero-logo" src="./FROP-logo_preview_01.jpg" alt="FROP logo" />
  <div class="clock" id="clock">--:--:--</div>

  <script>
    const clockEl = document.getElementById('clock');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateClock() {
      const now = new Date();
      clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
